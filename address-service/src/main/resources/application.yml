spring:
  application:
    name: address-service
  datasource:
    url: jdbc:mysql://localhost:3306/address_db_v2?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: root
    password: Ch@/12345678
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # create / create-drop / validate / none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true   # ← bật Circuit Breaker cho Feign

resilience4j:
  timelimiter:
    instances:
      employee-service:        # ← khớp với name trong @FeignClient
        timeoutDuration: 5s

  circuitbreaker:
    instances:
      employee-service:
        registerHealthIndicator: true
        eventConsumerBufferSize: 10
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 5
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 6s
        automaticTransitionFromOpenToHalfOpenEnabled: true
        permittedNumberOfCallsInHalfOpenState: 3

server:
  port: 8082

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    hostname: localhost
    prefer-ip-address: true

app:
  feign:
    user-service: http://localhost:8081
