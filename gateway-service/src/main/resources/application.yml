spring:
  application:
    name: gateway-service
  config:
    import: "configserver:http://localhost:8888"
  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1500
        max-interval: 3000
        multiplier: 1.5
management:
  endpoints:
    web:
      exposure:
        include: refresh, health