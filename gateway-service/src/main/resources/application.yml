spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/auth/**

            - id: employee-service
              uri: lb://EMPLOYEE-SERVICE
              predicates:
                - Path=/api/employees/**
              filters:
                - AuthFilter

            - id: address-service
              uri: lb://ADDRESS-SERVICE
              predicates:
                - Path=/api/address/**
              filters:
                - AuthFilter

server:
  port: 8080

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    hostname: localhost
    prefer-ip-address: true

jwt:
  secret: 9f3c7a1d6e2b8c4f5a7d9e1b3c6f8a2d4e7c1b5f9a3d6e8c2f4b7a1d5e9c3f6
  expiration: 86400000