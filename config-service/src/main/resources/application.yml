spring:
  application:
    name: config-service
  cloud:
    config:
      server:
        git:
          uri: https://github.com/Quoc-Chung/config-server-
          clone-on-start: true
          default-label: main        # branch m?c ??nh
          search-paths: '.'
          # N?u repo private:
          # username: your-github-username
          # password: your-github-token

server:
  port: 8888

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    hostname: localhost
    prefer-ip-address: true
management:
  endpoints:
    web:
      exposure:
        include: refresh, health